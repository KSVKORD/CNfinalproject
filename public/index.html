<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NetStream</title>
  <style>
    body { font-family: monospace; max-width: 640px; margin: 40px auto; padding: 0 16px; }
    #status { margin: 12px 0; color: #555; }
    #library { margin-top: 24px; }
    #library a { display: block; margin: 6px 0; }
  </style>
</head>
<body>
  <h1>NetStream</h1>

  <input type="file" id="file" accept="video/*">
  <button id="btn">Upload</button>
  <div id="status"></div>

  <div id="library">
    <h3>Library</h3>
    <div id="list"></div>
  </div>

  <script>
    const status = document.getElementById('status');
    const list   = document.getElementById('list');

    fetch('/videos').then(r => r.json()).then(ids => ids.forEach(addToLibrary));

    document.getElementById('btn').addEventListener('click', () => {
      const file = document.getElementById('file').files[0];
      if (!file) return;

      status.textContent = 'Uploading...';
      const form = new FormData();
      form.append('video', file);

      fetch('/upload', { method: 'POST', body: form })
        .then(r => r.json())
        .then(({ jobId, error }) => {
          if (error) { status.textContent = 'Upload error: ' + error; return; }
          status.textContent = 'Processing...';
          poll(jobId, 0);
        })
        .catch(() => { status.textContent = 'Upload failed.'; });
    });

    function poll(jobId, count) {
      // cap at 40 attempts (2 min) — failed jobs would otherwise poll forever
      if (count >= 40) { status.textContent = 'Timed out. Please retry.'; return; }
      fetch('/status/' + jobId)
        .then(r => r.json())
        .then(({ status: s, message }) => {
          if (s === 'ready') {
            status.textContent = 'Ready.';
            addToLibrary(jobId);
          } else if (s === 'error') {
            status.textContent = 'Error: ' + message;
          } else {
            setTimeout(() => poll(jobId, count + 1), 3000);
          }
        });
    }

    function addToLibrary(jobId) {
      if (document.getElementById('link-' + jobId)) return;
      const a = document.createElement('a');
      a.id   = 'link-' + jobId;
      a.href = 'player.html?jobId=' + jobId;
      a.textContent = jobId;
      list.appendChild(a);
    }
  </script>
</body>
</html>
